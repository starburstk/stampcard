<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>輝きグループ出席カード</title>

<style>

body{
font-family: "Hiragino Maru Gothic ProN", sans-serif;
text-align:center;
background:#fff7f7;
padding:40px;
}

h1{
color:#d33;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
margin-bottom:30px;
}

.card{
display:grid;
grid-template-columns:repeat(4,120px);
gap:20px;
justify-content:center;
margin:40px auto;
}

.slot{
font-size:80px;
}

button{
font-size:22px;
padding:15px 30px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

.stampbtn{
background:#ff6b81;
color:white;
}

.resetbtn{
background:#999;
color:white;
}

.history{
margin-top:40px;
font-size:20px;
}

</style>
</head>

<body>

<h1>🍓 輝きグループ出席カード 🍓</h1>
<div class="subtitle">「参加」ボタンを押してね</div>

<div class="card" id="card"></div>

<button class="stampbtn" onclick="addStamp()">🍓 参加</button>
<button class="resetbtn" onclick="resetCard()">リセット</button>

<div class="history">
<h3>履歴</h3>
<ul id="history"></ul>
</div>

<script>

let stamps = JSON.parse(localStorage.getItem("stamps")) || []

function render(){

const card=document.getElementById("card")
card.innerHTML=""

for(let i=0;i<8;i++){

let slot=document.createElement("div")
slot.className="slot"

if(stamps[i]){
slot.textContent="🍓"
}else{
slot.textContent="○"
}

card.appendChild(slot)

}

const list=document.getElementById("history")
list.innerHTML=""

stamps.forEach(d=>{
let li=document.createElement("li")
li.textContent=d
list.appendChild(li)
})

}

function addStamp(){

if(stamps.length>=8){
alert("スタンプは8個までです")
return
}

let today=new Date().toLocaleDateString("ja-JP")

stamps.push(today)

localStorage.setItem("stamps",JSON.stringify(stamps))

render()

}

function resetCard(){

if(confirm("スタンプを全部リセットしますか？")){
stamps=[]
localStorage.removeItem("stamps")
render()
}

}

render()

</script>

</body>
</html>
