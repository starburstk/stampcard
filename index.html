<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<title>出席カード</title>

<style>

body{
font-family:"Hiragino Maru Gothic ProN",sans-serif;
text-align:center;
background:#fff7f7;
margin:0;
padding:30px 10px;
user-select: none; 
-webkit-user-select: none;
}

h1{
font-size: 24px; 
color:#d33;
margin-top: 20px;
margin-bottom: 0px; 
white-space: nowrap; 
}

.title-icon {
font-size: 40px;
margin-top: 10px; 
margin-bottom: 10px;
}

.subtitle{
font-size:20px; 
margin-bottom:30px;
color: #333; 
}

.card{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:500px;
margin:40px auto;
}

.slot{
aspect-ratio: 3 / 4; 
display: flex;
flex-direction: column; 
align-items: center;
justify-content: center;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.stamp-mark {
font-size: 40px; 
}

.stamp-date {
font-size: 12px;
color: #666;
margin-top: 5px;
min-height: 14px; 
}

.buttons{
display: flex;
flex-direction: column;
align-items: center;
gap: 15px;
}

button{
font-size:24px; 
height: 60px; 
width: 220px; 
border:none;
border-radius:16px;
cursor:pointer;
display: flex; 
align-items: center;
justify-content: center;
padding: 0; 
font-weight: bold;
transition: opacity 0.2s;
}

button:active {
opacity: 0.7;
}

.stampbtn{
background:#ff6b81;
color:white;
}

.resetbtn{
background:#777;
color:white;
}

</style>
</head>

<body>

<h1>輝きグループ出席カード</h1>
<div class="title-icon">🍓</div>
<div class="subtitle">「参加」ボタンを押してね</div>

<div class="card" id="card"></div>

<div class="buttons">
  <button class="stampbtn" onclick="addStamp()">🍓 参加</button>
  <button class="resetbtn" onclick="resetCard()">リセット</button>
</div>

<script>

let stamps = JSON.parse(localStorage.getItem("stamps")) || []

function render(){

const card=document.getElementById("card")
card.innerHTML=""

for(let i=0;i<8;i++){

let slot=document.createElement("div")
slot.className="slot"

let mark=document.createElement("div")
mark.className="stamp-mark"

let dateText=document.createElement("div")
dateText.className="stamp-date"

if(stamps[i]){
  mark.textContent="🍓"
  dateText.textContent=stamps[i]
}else{
  mark.textContent="○"
  dateText.textContent=""
}

slot.appendChild(mark)
slot.appendChild(dateText)
card.appendChild(slot)

}

}

function addStamp(){

if(stamps.length>=8){
alert("スタンプは8個までです")
return
}

let today=new Date()
let dateStr=(today.getMonth() + 1) + "/" + today.getDate()

stamps.push(dateStr)

localStorage.setItem("stamps",JSON.stringify(stamps))

render()

}

function resetCard(){

if(confirm("スタンプを全部リセットしますか？")){
stamps=[]
localStorage.removeItem("stamps")
render()
}

}

render()

</script>

</body>
</html>
