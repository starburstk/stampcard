<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出席カード</title>

<style>

body{
font-family:"Hiragino Maru Gothic ProN",sans-serif;
text-align:center;
background:#fff7f7;
margin:0;
padding:30px 10px;
}

h1{
font-size:24px; 
color:#d33;
margin-bottom:10px;
white-space: nowrap; 
}

.icon {
font-size: 40px;
margin-bottom: 15px;
}

.subtitle{
font-size:22px; /* 説明文を大きくしました */
margin-bottom:30px;
}

.card{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:500px;
margin:40px auto;
}

.slot{
aspect-ratio: 3 / 4; 
display: flex;
flex-direction: column; /* 縦並びに変更 */
align-items: center;
justify-content: center;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* スタンプのマーク（○や🍓）用 */
.stamp-mark {
font-size: 40px; 
}

/* スタンプの下の日付用 */
.stamp-date {
font-size: 12px;
color: #666;
margin-top: 5px;
min-height: 14px; /* 日付がない時もレイアウトが崩れないように高さを確保 */
}

.buttons{
display: flex;
flex-direction: column;
align-items: center;
gap: 15px;
}

button{
font-size:24px; /* ボタンの文字を大きくしました */
padding:18px 60px; /* ボタンのサイズ（余白）を大きくしました */
font-weight: bold;
border:none;
border-radius:16px; /* 丸みも少し強めに */
cursor:pointer;
}

.stampbtn{
background:#ff6b81;
color:white;
}

.resetbtn{
background:#777;
color:white;
}

</style>
</head>

<body>

<h1>🍓 輝きグループ出席カード</h1>
<div class="icon">🍓</div>
<div class="subtitle">「参加」ボタンを押してね</div>

<div class="card" id="card"></div>

<div class="buttons">
  <button class="stampbtn" onclick="addStamp()">🍓 参加</button>
  <button class="resetbtn" onclick="resetCard()">リセット</button>
</div>

<script>

let stamps = JSON.parse(localStorage.getItem("stamps")) || []

function render(){

const card=document.getElementById("card")
card.innerHTML=""

for(let i=0;i<8;i++){

let slot=document.createElement("div")
slot.className="slot"

let mark=document.createElement("div")
mark.className="stamp-mark"

let dateText=document.createElement("div")
dateText.className="stamp-date"

// スタンプがある場合は🍓と日付を表示、ない場合は○のみ
if(stamps[i]){
  mark.textContent="🍓"
  dateText.textContent=stamps[i]
}else{
  mark.textContent="○"
  dateText.textContent=""
}

slot.appendChild(mark)
slot.appendChild(dateText)
card.appendChild(slot)

}

}

function addStamp(){

if(stamps.length>=8){
alert("スタンプは8個までです")
return
}

let today=new Date()
// 枠内に収まりやすいように「月/日」の形式に変更
let dateStr=(today.getMonth() + 1) + "/" + today.getDate()

stamps.push(dateStr)

localStorage.setItem("stamps",JSON.stringify(stamps))

render()

}

function resetCard(){

if(confirm("スタンプを全部リセットしますか？")){
stamps=[]
localStorage.removeItem("stamps")
render()
}

}

render()

</script>

</body>
</html>
